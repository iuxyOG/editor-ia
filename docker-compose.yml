version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - uploads:/app/public/uploads
      - outputs:/app/public/outputs
      - dbdata:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  uploads:
  outputs:
  dbdata:
